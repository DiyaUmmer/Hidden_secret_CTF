<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gryffindor Common Room</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        window.onload = function() {
            alert("🧙 Welcome, brave soul! Use this token: {{ popup_token }}");
        };
    </script>
    <style>
        body.gryffindor-bg {
            background-image: url("{{ url_for('static', filename='images/gryffindor_bg.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
            font-family: 'Georgia', serif;
            min-height: 100vh;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 2rem;
            max-width: 600px;
            margin: 5% auto;
            border-radius: 15px;
            box-shadow: 0 0 15px gold;
            text-align: center;
        }

        input[type="text"] {
            padding: 10px;
            width: 80%;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: gold;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #d4af37;
        }

        #flagResult {
            margin-top: 20px;
            color: lightgreen;
            font-weight: bold;
            font-size: 1.2em;
        }
    </style>
</head>
<body class="gryffindor-bg">
    <div class="container">
        <h2>🦁 Gryffindor Common Room</h2>
        <p>A test of bravery awaits. Use the token you discovered upon entry.</p>

        <form method="POST">
            <input type="text" name="decoded" placeholder="Paste your bravery token here..." required>
            <br>
            <button type="submit">Submit</button>
        </form>

        {% if flag_found %}
            <div id="flagResult">✅ Flag: {{ flag_value }}</div>
        {% endif %}

        <p style="margin-top: 20px;"><a href="{{ url_for('login') }}">🔙 Back to Login</a></p>
    </div>
     <div id="timer" style="font-size: 18px; font-weight: bold; position: fixed; top: 10px; right: 10px; background: #222; color: #fff; padding: 8px 12px; border-radius: 5px; z-index: 1000;">
    Time left: 10:00
  </div>
  
  <script src="static/js/timer.js"></script>
</body>
</html>
